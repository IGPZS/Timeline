name: Download Timeline Images
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Download images from Wikimedia
        run: |
          mkdir -p assets/images
          UA="Mozilla/5.0 (compatible; WikimediaBot/1.0)"
          download() { curl -L -A "$UA" -o "assets/images/$1" "$2" || echo "FAILED: $1"; }
          download homer.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1c/Homer_bust_louvre_front.JPG/400px-Homer_bust_louvre_front.JPG"
          download draco.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Republication_of_Draco_Law_on_homicide_-_408-409_BC.jpg/400px-Republication_of_Draco_Law_on_homicide_-_408-409_BC.jpg"
          download cleisthenes.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8b/Kleisthenes.jpg/400px-Kleisthenes.jpg"
          download peloponnesian.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/7/70/PeloponnesianWar.png/400px-PeloponnesianWar.png"
          download macedonia.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/9/92/Map_Macedonia_336_BC-en.svg/400px-Map_Macedonia_336_BC-en.svg.png"
          download twelve-tables.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d5/Twelve_Tables.jpg/400px-Twelve_Tables.jpg"
          download gracchi.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Les_Gracques_par_Flandrin.jpg/400px-Les_Gracques_par_Flandrin.jpg"
          download sulla.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/Bust_of_Sulla_%28Glyptothek%2C_Munich%29.jpg/400px-Bust_of_Sulla_%28Glyptothek%2C_Munich%29.jpg"
          download caesar.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0f/Gaius_Iulius_Caesar_%28100-44_BC%29.jpg/400px-Gaius_Iulius_Caesar_%28100-44_BC%29.jpg"
          download julio-claudian.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ea/0_Tib%C3%A8re_-_Mus%C3%A9e_du_Louvre_%281%29.jpg/400px-0_Tib%C3%A8re_-_Mus%C3%A9e_du_Louvre_%281%29.jpg"
          download flavian.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Colosseo_2020.jpg/400px-Colosseo_2020.jpg"
          download trajan.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/0/00/Traianus_Glyptothek_Munich_72.jpg/400px-Traianus_Glyptothek_Munich_72.jpg"
          download severan.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Septimius_Severus_Glyptothek_Munich_357.jpg/400px-Septimius_Severus_Glyptothek_Munich_357.jpg"
          download gallic-empire.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/c/cf/Gallic_Empire.svg/400px-Gallic_Empire.svg.png"
          download palmyra.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Bust_of_Zenobia_-_Musei_Capitolini.jpg/400px-Bust_of_Zenobia_-_Musei_Capitolini.jpg"
          download aurelian.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Aurelianus_bust.jpg/400px-Aurelianus_bust.jpg"
          download milvian-bridge.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/5/55/Galeazzo_Campi_Battle_of_Milvian_Bridge.jpg/400px-Galeazzo_Campi_Battle_of_Milvian_Bridge.jpg"
          download constantinople.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b7/Walls_of_Constantinople.jpg/400px-Walls_of_Constantinople.jpg"
          download adrianople.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/Battle_of_Adrianople.png/400px-Battle_of_Adrianople.png"
          download codex-theodosianus.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Codex_Theodosianus.jpg/400px-Codex_Theodosianus.jpg"
          download stilicho.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/6/66/Stilicho_diptych_-_Monza.jpg/400px-Stilicho_diptych_-_Monza.jpg"
          download iconoclasm.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/9/92/Iconoclasm_christ_chludov.jpg/400px-Iconoclasm_christ_chludov.jpg"
          download ecloga.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/4/48/Ecloga_1_page.jpg/400px-Ecloga_1_page.jpg"
          download basilika.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Basilika_Leo6.jpg/400px-Basilika_Leo6.jpg"
          download macedonian.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Basil_II_from_Venice_Psalter.jpg/400px-Basil_II_from_Venice_Psalter.jpg"
      - name: Commit images
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/IGPZS/Timeline.git
          git add assets/images/
          git diff --cached --quiet || git commit -m "Add 25 timeline images from Wikimedia"
          git push
