name: Fix Timeline Images

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download images from Wikimedia Commons
        run: |
          mkdir -p assets/images
          UA="Mozilla/5.0 (compatible; TimelineBot/2.0)"

          download_checked() {
            local out="assets/images/$1"
            local url="$2"
            local tmp="${out}.tmp"
            http_code=$(curl -L -A "$UA" -o "$tmp" -w "%{http_code}" -s "$url")
            content_type=$(file --mime-type -b "$tmp" 2>/dev/null || echo "unknown")
            if [[ "$http_code" == "200" ]] && [[ "$content_type" == image/* ]]; then
              mv "$tmp" "$out"
              echo "OK: $1 ($content_type)"
            else
              rm -f "$tmp"
              echo "FAIL: $1 http=$http_code type=$content_type"
              exit 1
            fi
          }

          download_checked homer.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Homer_bust_louvre_front.JPG/800px-Homer_bust_louvre_front.JPG"
          download_checked draco.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/1/14/Republication_of_Draco_Law_on_homicide_-_408-409_BC.jpg/800px-Republication_of_Draco_Law_on_homicide_-_408-409_BC.jpg"
          download_checked cleisthenes.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/3/36/Cleisthenes.jpg/800px-Cleisthenes.jpg"
          download_checked peloponnesian.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/5/57/Map_Peloponnesian_War_431_BC-en.svg/800px-Map_Peloponnesian_War_431_BC-en.svg.png"
          download_checked macedonia.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/3/33/Map_Macedonia_336_BC-en.svg/800px-Map_Macedonia_336_BC-en.svg.png"
          download_checked twelve-tables.jpg "https://upload.wikimedia.org/wikipedia/commons/a/ab/Twelve_Tables_Engraving.jpg"
          download_checked gracchi.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/8/87/Eugene_Guillaume_-_the_Gracchi.jpg/800px-Eugene_Guillaume_-_the_Gracchi.jpg"
          download_checked sulla.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/9/99/Sulla_Glyptothek_Munich_309.jpg/800px-Sulla_Glyptothek_Munich_309.jpg"
          download_checked caesar.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Julius_Caesar_Bust.jpg/800px-Julius_Caesar_Bust.jpg"
          download_checked julio-claudian.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/f/f4/Marble_Bust_of_Emperor_Tiberius%2C_4-37_AD_%2828735092865%29.jpg/800px-Marble_Bust_of_Emperor_Tiberius%2C_4-37_AD_%2828735092865%29.jpg"
          download_checked flavian.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/d/de/Colosseo_2020.jpg/800px-Colosseo_2020.jpg"
          download_checked trajan.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Traianus_Glyptothek_Munich_72.jpg/800px-Traianus_Glyptothek_Munich_72.jpg"
          download_checked severan.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Septimius_Severus_Glyptothek_Munich_357.jpg/800px-Septimius_Severus_Glyptothek_Munich_357.jpg"
          download_checked gallic-empire.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/GallicEmpire262.png/800px-GallicEmpire262.png"
          download_checked palmyra.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Beauty_of_Palmyra.jpg/800px-Beauty_of_Palmyra.jpg"
          download_checked aurelian.jpg "https://upload.wikimedia.org/wikipedia/commons/9/99/Romuliana_Galerius_head.jpg"
          download_checked milvian-bridge.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/4/42/Giulio_Romano_-_The_Battle_of_the_Milvian_Bridge.jpg/800px-Giulio_Romano_-_The_Battle_of_the_Milvian_Bridge.jpg"
          download_checked constantinople.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/a/af/Walls_of_Constantinople.jpg/800px-Walls_of_Constantinople.jpg"
          download_checked adrianople.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/9/96/Death_of_Emperor_Valens_during_the_battle_of_Adrianople%2C_378.jpg/800px-Death_of_Emperor_Valens_during_the_battle_of_Adrianople%2C_378.jpg"
          download_checked codex-theodosianus.jpg "https://upload.wikimedia.org/wikipedia/commons/a/ae/Codex_Theodosianus.jpg"
          download_checked stilicho.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8b/Stilico_diptych.jpg/800px-Stilico_diptych.jpg"
          download_checked iconoclasm.jpg "https://upload.wikimedia.org/wikipedia/commons/c/c0/Clasm_Chludov_detail_9th_century.jpg"
          download_checked ecloga.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/7/71/Imperial_Gate_Hagia_Sophia_2007a.jpg/800px-Imperial_Gate_Hagia_Sophia_2007a.jpg"
          download_checked basilika.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/7/74/BasilII.jpg/800px-BasilII.jpg"
          download_checked macedonian.jpg "https://upload.wikimedia.org/wikipedia/commons/thumb/3/33/Basileios_II%2C_BNM%2C_MS._gr._17_Fol._3r.jpg/800px-Basileios_II%2C_BNM%2C_MS._gr._17_Fol._3r.jpg"

      - name: Commit fixed images
        run: |
          git config user.name "Timeline Bot"
          git config user.email "actions@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/IGPZS/Timeline.git
          git add assets/images/
          git diff --cached --quiet || git commit -m "Fix 25 broken timeline images with validated Commons URLs"
          git push
